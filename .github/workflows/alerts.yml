name: NQ Discord Alerts

on:
  workflow_dispatch:
  schedule:
    # UTC times. During UK summer time, UTC + 1 = UK time.

    # Weekday trading-session workflows
    - cron: "0 7 * * 1-5"        # 08:00 UK market snapshot
    - cron: "0 7 * * 1-5"        # 08:00 UK economic calendar
    - cron: "0 11 * * 1-5"       # 12:00 UK economic calendar reminder
    - cron: "30 11 * * 1-5"      # 12:30 UK NQ main brief
    - cron: "30 12 * * 1-5"      # 13:30 UK macro/rates
    - cron: "30 13 * * 1-5"      # 14:30 UK critical scan
    - cron: "0 15 * * 1-5"       # 16:00 UK AI/semis
    - cron: "30 20 * * 1-5"      # 21:30 UK earnings

    # 7-day awareness workflows
    - cron: "0 7-21 * * *"       # General news hourly 08:00–22:00 UK
    - cron: "15 7-21 * * *"      # Trump posts hourly 08:15–22:15 UK
    - cron: "45 7-21 * * *"      # Critical alerts hourly 08:45–22:45 UK

jobs:
  alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Decide mode
        run: |
          echo "MODE=general" >> $GITHUB_ENV

          if [ "${{ github.event.schedule }}" = "0 7 * * 1-5" ]; then
            echo "MODE=market" >> $GITHUB_ENV
          fi

          if [ "${{ github.event.schedule }}" = "0 11 * * 1-5" ]; then
            echo "MODE=economic_calendar" >> $GITHUB_ENV
          fi

          if [ "${{ github.event.schedule }}" = "30 11 * * 1-5" ]; then
            echo "MODE=brief" >> $GITHUB_ENV
          fi

          if [ "${{ github.event.schedule }}" = "30 12 * * 1-5" ]; then
            echo "MODE=macro" >> $GITHUB_ENV
          fi

          if [ "${{ github.event.schedule }}" = "30 13 * * 1-5" ]; then
            echo "MODE=critical" >> $GITHUB_ENV
          fi

          if [ "${{ github.event.schedule }}" = "0 15 * * 1-5" ]; then
            echo "MODE=ai_semis" >> $GITHUB_ENV
          fi

          if [ "${{ github.event.schedule }}" = "30 20 * * 1-5" ]; then
            echo "MODE=earnings" >> $GITHUB_ENV
          fi

          if [ "${{ github.event.schedule }}" = "15 7-21 * * *" ]; then
            echo "MODE=trump" >> $GITHUB_ENV
          fi

          if [ "${{ github.event.schedule }}" = "45 7-21 * * *" ]; then
            echo "MODE=critical" >> $GITHUB_ENV
          fi

      - name: Run alert script
        env:
          DISCORD_CRITICAL_WEBHOOK: ${{ secrets.DISCORD_CRITICAL_WEBHOOK }}
          DISCORD_BRIEF_WEBHOOK: ${{ secrets.DISCORD_BRIEF_WEBHOOK }}
          DISCORD_MACRO_WEBHOOK: ${{ secrets.DISCORD_MACRO_WEBHOOK }}
          DISCORD_AI_SEMIS_WEBHOOK: ${{ secrets.DISCORD_AI_SEMIS_WEBHOOK }}
          DISCORD_EARNINGS_WEBHOOK: ${{ secrets.DISCORD_EARNINGS_WEBHOOK }}
          DISCORD_NEWS_WEBHOOK: ${{ secrets.DISCORD_NEWS_WEBHOOK }}
          DISCORD_TRUMP_WEBHOOK: ${{ secrets.DISCORD_TRUMP_WEBHOOK }}
          DISCORD_MARKET_DATA_WEBHOOK: ${{ secrets.DISCORD_MARKET_DATA_WEBHOOK }}
          DISCORD_ECONOMIC_CALENDAR: ${{ secrets.DISCORD_ECONOMIC_CALENDAR }}
          MODE: ${{ env.MODE }}

        run: python nq_alerts.py
