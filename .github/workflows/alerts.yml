name: NQ Discord Alerts

on:
  schedule:
    # UTC times. During UK summer time, UTC + 1 = UK time.

    # Market snapshot: 08:00 UK
    - cron: "0 7 * * 1-5"

    # Main NQ prep brief: 12:30 UK
    - cron: "30 11 * * 1-5"

    # Macro/rates update: 13:30 UK
    - cron: "30 12 * * 1-5"

    # Critical scan: 14:30 UK
    - cron: "30 13 * * 1-5"

    # General market news hourly: 08:00–22:00 UK
    - cron: "0 7-21 * * 1-5"

    # Trump posts hourly: 08:15–22:15 UK
    - cron: "15 7-21 * * 1-5"

  workflow_dispatch:

jobs:
  alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run alert script
        env:
          DISCORD_CRITICAL_WEBHOOK: ${{ secrets.DISCORD_CRITICAL_WEBHOOK }}
          DISCORD_BRIEF_WEBHOOK: ${{ secrets.DISCORD_BRIEF_WEBHOOK }}
          DISCORD_MACRO_WEBHOOK: ${{ secrets.DISCORD_MACRO_WEBHOOK }}
          DISCORD_AI_SEMIS_WEBHOOK: ${{ secrets.DISCORD_AI_SEMIS_WEBHOOK }}
          DISCORD_EARNINGS_WEBHOOK: ${{ secrets.DISCORD_EARNINGS_WEBHOOK }}
          DISCORD_NEWS_WEBHOOK: ${{ secrets.DISCORD_NEWS_WEBHOOK }}
          DISCORD_TRUMP_WEBHOOK: ${{ secrets.DISCORD_TRUMP_WEBHOOK }}
          DISCORD_MARKET_DATA_WEBHOOK: ${{ secrets.DISCORD_MARKET_DATA_WEBHOOK }}

          MODE: ${{ 
            github.event.schedule == '30 11 * * 1-5' && 'brief' ||
            github.event.schedule == '30 12 * * 1-5' && 'macro' ||
            github.event.schedule == '30 13 * * 1-5' && 'critical' ||
            github.event.schedule == '15 7-21 * * 1-5' && 'trump' ||
            github.event.schedule == '0 7 * * 1-5' && 'market' ||
            'general'
          }}

        run: python nq_alerts.py
